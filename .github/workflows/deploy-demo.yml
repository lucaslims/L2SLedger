name: Deploy to DEMO (Auto)

on:
  workflow_run:
    workflows: ["Backend CI", "Frontend CI"]
    branches: [main]
    types: [completed]

# Only one deploy at a time per branch
concurrency:
  group: demo-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  COMPOSE_FILE: docker-compose.prod.yml

permissions:
  contents: read
  packages: read

jobs:
  # ── Determine what to deploy ──────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      deploy_tag: ${{ steps.tag.outputs.deploy_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

      - name: Determine deploy tag
        id: tag
        run: |
          # Use SHA-based tag for automatic deploys
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DEPLOY_TAG="sha-${SHORT_SHA}"
          echo "deploy_tag=${DEPLOY_TAG}" >> "$GITHUB_OUTPUT"
          echo "::notice::Will deploy tag: ${DEPLOY_TAG}"

  # ── Validate images exist ──────────────────────────────────────
  validate:
    name: Validate Images
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'
    outputs:
      backend_image: ${{ steps.resolve.outputs.backend_image }}
      frontend_image: ${{ steps.resolve.outputs.frontend_image }}

    steps:
      - name: Resolve image references
        id: resolve
        run: |
          OWNER="${{ github.repository_owner }}"
          TAG="${{ needs.detect-changes.outputs.deploy_tag }}"
          echo "backend_image=${{ env.REGISTRY }}/${OWNER}/l2sledger-backend:${TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ env.REGISTRY }}/${OWNER}/l2sledger-frontend:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify backend image exists
        if: needs.detect-changes.outputs.backend == 'true'
        run: |
          echo "::notice::Checking backend image: ${{ steps.resolve.outputs.backend_image }}"
          docker manifest inspect ${{ steps.resolve.outputs.backend_image }}

      - name: Verify frontend image exists
        if: needs.detect-changes.outputs.frontend == 'true'
        run: |
          echo "::notice::Checking frontend image: ${{ steps.resolve.outputs.frontend_image }}"
          docker manifest inspect ${{ steps.resolve.outputs.frontend_image }}

  # ── Deploy to DEMO ─────────────────────────────────────────────
  deploy:
    name: Deploy to DEMO VM
    needs: [detect-changes, validate]
    runs-on: ubuntu-latest
    environment: demo

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.prod.yml

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEMO_VM_HOST }}
          username: ${{ secrets.DEMO_VM_USER }}
          key: ${{ secrets.DEMO_VM_SSH_KEY }}
          port: ${{ secrets.DEMO_VM_SSH_PORT || 22 }}
          script: |
            set -euo pipefail

            echo "═══ Authenticating to GHCR ═══"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd ${{ secrets.DEMO_VM_DEPLOY_PATH || '/opt/l2sledger' }}

            echo "═══ Setting image tag ═══"
            export IMAGE_TAG="${{ needs.detect-changes.outputs.deploy_tag }}"
            export GHCR_OWNER="${{ github.repository_owner }}"

            if [ "${{ needs.detect-changes.outputs.backend }}" = "true" ]; then
              echo "═══ Deploying backend ═══"
              docker compose -f docker-compose.prod.yml pull backend
              docker compose -f docker-compose.prod.yml up -d --no-deps backend
            fi

            if [ "${{ needs.detect-changes.outputs.frontend }}" = "true" ]; then
              echo "═══ Deploying frontend ═══"
              docker compose -f docker-compose.prod.yml pull frontend
              docker compose -f docker-compose.prod.yml up -d --no-deps frontend
            fi

            echo "═══ Cleaning old images ═══"
            docker image prune -f --filter "until=168h"

            echo "═══ Checking status ═══"
            sleep 10
            docker compose -f docker-compose.prod.yml ps

            echo "═══ Deploy complete ═══"

      - name: Verify backend health
        if: needs.detect-changes.outputs.backend == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEMO_VM_HOST }}
          username: ${{ secrets.DEMO_VM_USER }}
          key: ${{ secrets.DEMO_VM_SSH_KEY }}
          port: ${{ secrets.DEMO_VM_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            # Port 8080 is not published to the host (expose-only in prod).
            # Use Docker's built-in HEALTHCHECK status instead.
            max_retries=15
            count=0
            sleep 10
            until [ "$(docker inspect -f '{{.State.Health.Status}}' l2sledger-backend 2>/dev/null)" = "healthy" ]; do
              count=$((count + 1))
              if [ $count -ge $max_retries ]; then
                echo "::error::Backend health check failed after ${max_retries} retries"
                docker logs l2sledger-backend --tail 50
                exit 1
              fi
              echo "Waiting for backend... (${count}/${max_retries})"
              sleep 10
            done
            echo "✅ Backend is healthy"

      - name: Verify frontend health
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEMO_VM_HOST }}
          username: ${{ secrets.DEMO_VM_USER }}
          key: ${{ secrets.DEMO_VM_SSH_KEY }}
          port: ${{ secrets.DEMO_VM_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            # Port 3000 is not published to the host (expose-only in prod).
            # Use Docker's built-in HEALTHCHECK status instead.
            max_retries=15
            count=0
            sleep 10
            until [ "$(docker inspect -f '{{.State.Health.Status}}' l2sledger-frontend 2>/dev/null)" = "healthy" ]; do
              count=$((count + 1))
              if [ $count -ge $max_retries ]; then
                echo "::error::Frontend health check failed after ${max_retries} retries"
                docker logs l2sledger-frontend --tail 50
                exit 1
              fi
              echo "Waiting for frontend... (${count}/${max_retries})"
              sleep 10
            done
            echo "✅ Frontend is healthy"

      - name: Create deployment summary
        if: always()
        run: |
          echo "## 🚀 DEMO Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ needs.detect-changes.outputs.deploy_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services deployed:**" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.detect-changes.outputs.backend }}" = "true" ]; then
            echo "- ✅ Backend" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.detect-changes.outputs.frontend }}" = "true" ]; then
            echo "- ✅ Frontend" >> $GITHUB_STEP_SUMMARY
          fi
