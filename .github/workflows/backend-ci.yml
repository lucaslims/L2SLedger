name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/l2sledger-backend

permissions:
  contents: read

jobs:
  # ── Step 1: Build, Test, Quality ──────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Build
        run: dotnet build --no-restore -c Release -warnaserror

      - name: Run tests
        run: |
          dotnet test --no-build -c Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results/
          retention-days: 30

      - name: Check vulnerable packages
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
        continue-on-error: true

      - name: Fail on critical vulnerabilities
        run: |
          if grep -qi "Critical" vuln-report.txt; then
            echo "::error::Critical vulnerabilities found in NuGet packages"
            exit 1
          fi

  # ── Step 2: Build & Push Docker Image ─────────────────────────
  docker:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern=v{{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern=v{{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=short

      - name: Resolve build version
        id: version
        run: |
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            # Extract SemVer from tag (e.g., v1.2.3 → 1.2.3)
            VERSION="${REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Scan Docker image with Trivy
        id: trivy
        if: steps.docker-build.outcome == 'success'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      # Trivy SARIF upload disabled until Code Scanning is enabled in repository settings
      # To enable: Remove 'if: false' after enabling Advanced Security in Settings > Code security
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: false  # Disabled: Code Scanning not enabled (requires GitHub Advanced Security)
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  # ── Step 3: CodeQL Analysis ───────────────────────────────────
  codeql:
    name: CodeQL Analysis
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: manual

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build for CodeQL
        working-directory: backend
        run: dotnet build -c Release

      # CodeQL SARIF upload disabled until Code Scanning is enabled in repository settings
      # To enable: Remove 'if: false' after enabling Advanced Security in Settings > Code security
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        if: false  # Disabled: Code Scanning not enabled (requires GitHub Advanced Security)
        with:
          category: '/language:csharp'
