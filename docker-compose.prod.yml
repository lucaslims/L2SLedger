# ══════════════════════════════════════════════════════════════════
# docker-compose.prod.yml — PRODUCTION DEPLOYMENT
# ══════════════════════════════════════════════════════════════════
# This compose file is used ONLY on the production VM (OCI).
# It pulls pre-built images from GHCR — it does NOT build locally.
#
# PostgreSQL and Redis run in separate containers managed outside
# this compose stack. They are accessed via the shared-db-network.
#
# Caddy runs separately on the VM as the reverse proxy.
# Containers are NOT exposed directly — Caddy routes to them
# via Docker DNS on the caddy-network.
#
# Usage on VM:
#   export IMAGE_TAG=v1.2.3          # or sha-abc1234
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
# ══════════════════════════════════════════════════════════════════

services:
  # ── Backend (.NET 9) ──────────────────────────────────────────
  backend:
    image: ghcr.io/${GHCR_OWNER:-l2s-ledger}/l2sledger-backend:${IMAGE_TAG:-latest}
    container_name: l2sledger-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT:-5432};Database=l2sledger;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - JWT__Secret=${JWT_SECRET}
      - JWT__Issuer=${JWT_ISSUER}
      - JWT__Audience=${JWT_AUDIENCE}
      - Firebase__WebAPIKey=${FIREBASE_WEB_API_KEY}
      - Firebase__CredentialPath=/secrets/firebase-credential.json
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS}
    volumes:
      - ${FIREBASE_CREDENTIAL_PATH}:/secrets/firebase-credential.json:ro
    expose:
      - "8080"
    networks:
      - caddy-network
      - shared-db-network
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Frontend (React SPA via serve) ───────────────────────────
  frontend:
    image: ghcr.io/${GHCR_OWNER:-l2s-ledger}/l2sledger-frontend:${IMAGE_TAG:-latest}
    container_name: l2sledger-frontend
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
      - VITE_ENABLE_DEVTOOLS=false
      - NODE_ENV=production
    expose:
      - "3000"
    networks:
      - caddy-network
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

networks:
  caddy-network:
    external: true
  shared-db-network:
    external: true
