version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: l2sledger-postgres-dev
    environment:
      POSTGRES_DB: l2sledger
      POSTGRES_USER: l2sledger
      POSTGRES_PASSWORD: l2sledger
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U l2sledger"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
